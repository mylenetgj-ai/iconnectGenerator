<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iCONNECT Email Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      background: #f5f5f3;
      color: #1a1a1a;
      line-height: 1.6;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      margin: 0;
      color: #1a1a1a;
    }

    header span {
      font-size: 13px;
      color: #888;
    }

    .container {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1.25rem 3rem;
    }

    .tab-row {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
    }

    .tab {
      padding: 7px 18px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: transparent;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .tab:hover { background: #f0f0ee; }

    .tab.active {
      background: #1a1a1a;
      color: #fff;
      border-color: transparent;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 1rem;
    }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fff;
      margin-bottom: 12px;
      transition: border-color 0.15s;
      appearance: auto;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #888;
    }

    .hint {
      font-size: 12px;
      color: #aaa;
      margin: -8px 0 10px;
    }

    .row { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 12px; }
    .row3 { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr) minmax(0,1fr); gap: 12px; }

    @media (max-width: 560px) {
      .row, .row3 { grid-template-columns: 1fr; }
    }

    .listing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .listing-num {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: transparent;
      color: #1a1a1a;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #f0f0ee; }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border-color: transparent;
    }

    .btn-primary:hover { background: #333; }

    .btn-danger {
      color: #c0392b;
      border-color: #f5c6c2;
      font-size: 12px;
      padding: 5px 10px;
    }

    .btn-danger:hover { background: #fdf0ef; }

    .cpe-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #1565c0;
      background: #e8f0fe;
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
    }

    .actions { display: flex; gap: 8px; align-items: center; margin-bottom: 1.5rem; }

    .email-output {
      background: #fafaf8;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1.5rem;
      font-size: 13px;
      white-space: pre-wrap;
      line-height: 1.8;
      font-family: 'Courier New', Courier, monospace;
      margin-bottom: 1.25rem;
      word-break: break-word;
    }

    .copy-msg {
      font-size: 13px;
      color: #2e7d32;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>iCONNECT Email Generator</h1>
  <span>Training hours notification</span>
</header>

<div class="container">
  <div class="tab-row">
    <button class="tab active" onclick="showTab('form')">Form</button>
    <button class="tab" onclick="showTab('preview')">Preview email</button>
  </div>

  <div id="formView">
    <div class="card">
      <div class="section-title">Recipient</div>
      <label>Recipient name</label>
      <input type="text" id="recipientName" placeholder="e.g. John Tan">
    </div>

    <div class="card">
      <div class="section-title">Event eligibility</div>
      <label>Open to (job designation / group)</label>
      <input type="text" id="jobDesig" placeholder="e.g. all Pharmacists, Senior Pharmacists and above">
      <p class="hint">This defines who the event is open to — it will appear in the opening line of the email.</p>
    </div>

    <div id="listingsContainer"></div>

    <div class="actions">
      <button class="btn" onclick="addListing()">+ Add listing</button>
    </div>

    <div style="display:flex; gap:8px;">
      <button class="btn btn-primary" onclick="showTab('preview')">Generate email →</button>
    </div>
  </div>

  <div id="previewView" style="display:none;">
    <div class="email-output" id="emailOutput"></div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn btn-primary" onclick="copyEmail()">Copy email</button>
      <button class="btn" onclick="showTab('form')">← Back to form</button>
      <span class="copy-msg" id="copyMsg">Copied to clipboard!</span>
    </div>
  </div>
</div>

<script>
  const WORKGROUPS = {
    "MS": "Medication Safety",
    "SCC": "Smoking Cessation Community",
    "RET": "Retail",
    "PD": "Professional Development",
    "ILTC": "Intermediate Long-Term Care",
    "ESS": "Ensure Safer System",
    "JiW": "Joy in Work",
    "PE": "Public Education",
    "MTM": "Medication Therapy Management",
    "BC": "Board Cert",
    "NLB": "National Library Board"
  };

  const BRANCHES = ["AMK","GEY","HOU","KAL","KHA","SEM","TOA","WDL","YIS","SER","PSC"];

  let listings = [];
  let nextId = 1;

  function calcCPE(hours) {
    const h = parseFloat(hours);
    if (isNaN(h) || h <= 0) return 0;
    if (h < 2) return 1;
    if (h < 4) return 2;
    if (h < 6) return 3;
    return 4;
  }

  function addListing() {
    listings.push(nextId++);
    renderListings();
  }

  function removeListing(id) {
    listings = listings.filter(l => l !== id);
    renderListings();
  }

  function renderListings() {
    const container = document.getElementById('listingsContainer');
    container.innerHTML = '';
    if (listings.length === 0) { addListing(); return; }

    listings.forEach((id, idx) => {
      const div = document.createElement('div');
      div.className = 'card';
      div.id = 'listing-' + id;
      div.innerHTML = `
        <div class="listing-header">
          <span class="listing-num">Listing ${idx + 1}</span>
          ${listings.length > 1 ? `<button class="btn btn-danger" onclick="removeListing(${id})">Remove</button>` : ''}
        </div>
        <div class="row">
          <div>
            <label>Prefix</label>
            <select id="prefix-${id}" onchange="onPrefixChange(${id})">
              <option value="PH HQ">PH HQ — General courses</option>
              <option value="PH CE">PH CE — Clinically-related courses</option>
              <option value="PH XXX">PH XXX — Branch specific</option>
            </select>
          </div>
          <div id="branchWrap-${id}" style="display:none;">
            <label>Branch</label>
            <select id="branch-${id}">
              ${BRANCHES.map(b => `<option value="${b}">${b}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="row">
          <div>
            <label>Workgroup</label>
            <select id="workgroup-${id}">
              ${Object.entries(WORKGROUPS).map(([k,v]) => `<option value="${k}">${k} — ${v}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>Course / talk title</label>
            <input type="text" id="title-${id}" placeholder="e.g. Asthma and COPD">
          </div>
        </div>
        <div class="row3">
          <div>
            <label>Completion date</label>
            <input type="date" id="date-${id}">
          </div>
          <div>
            <label>Completion time</label>
            <input type="time" id="time-${id}">
          </div>
          <div>
            <label>Total hours</label>
            <input type="number" id="hours-${id}" min="0.5" step="0.5" placeholder="e.g. 1" oninput="updateCPE(${id})">
          </div>
        </div>
        <div id="cpeBadge-${id}"></div>
      `;
      container.appendChild(div);
    });
  }

  function onPrefixChange(id) {
    const val = document.getElementById('prefix-' + id).value;
    document.getElementById('branchWrap-' + id).style.display = val === 'PH XXX' ? 'block' : 'none';
  }

  function updateCPE(id) {
    const h = document.getElementById('hours-' + id).value;
    const pts = calcCPE(h);
    const badge = document.getElementById('cpeBadge-' + id);
    badge.innerHTML = h && parseFloat(h) > 0
      ? `<span class="cpe-badge">Auto-calculated CPE points: <strong>${pts}</strong></span>`
      : '';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function formatTime(timeStr) {
    if (!timeStr) return '—';
    const [h, m] = timeStr.split(':');
    const hour = parseInt(h);
    const ampm = hour >= 12 ? 'pm' : 'am';
    const displayHour = hour % 12 || 12;
    return `${displayHour}.${m}${ampm}`;
  }

  function getMMYY(dateStr) {
    if (!dateStr) return 'MM/YY';
    const d = new Date(dateStr + 'T00:00:00');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const yy = String(d.getFullYear()).slice(-2);
    return `${mm}/${yy}`;
  }

  function buildIConnectDesc(id) {
    const prefixRaw = document.getElementById('prefix-' + id).value;
    const branch = document.getElementById('branch-' + id)?.value || '';
    const wg = document.getElementById('workgroup-' + id).value;
    const title = document.getElementById('title-' + id).value || '[Title]';
    const mmyy = getMMYY(document.getElementById('date-' + id).value);
    const prefix = prefixRaw === 'PH XXX' ? 'PH ' + branch : prefixRaw;
    return `${prefix}_${wg}_${title}_${mmyy}`;
  }

  function buildTable(id) {
    const desc = buildIConnectDesc(id);
    const dateStr = document.getElementById('date-' + id).value;
    const timeStr = document.getElementById('time-' + id).value;
    const hours = document.getElementById('hours-' + id).value || '—';
    const cpe = calcCPE(hours);

    const c1 = 34, c2 = 22;
    const line = '+' + '-'.repeat(c1 + 2) + '+' + '-'.repeat(c2 + 2) + '+';
    const row = (a, b) => `| ${String(a).padEnd(c1)} | ${String(b).padEnd(c2)} |`;

    return [
      line,
      row('iConnect Description', ''),
      row('(course/talk title)', ''),
      row(desc, ''),
      line,
      row('Completion Date', formatDate(dateStr)),
      line,
      row('Completion Time', formatTime(timeStr)),
      line,
      row('Total Hour(s)', hours),
      line,
      row('CPE Point(s)', cpe),
      line,
    ].join('\n');
  }

  function generateEmail() {
    const name = document.getElementById('recipientName').value || '[Name]';
    const desig = document.getElementById('jobDesig').value || '[Job Designation / Group]';
    const tables = listings.map(id => buildTable(id)).join('\n\n');

    document.getElementById('emailOutput').textContent =
`Dear ${name},

The following event(s) is/are open to ${desig}. Self-registration is required.

__To Capture Training Hours in iCONNECT__

${tables}

Please use the External Event in 'Add to Learning History' feature to capture the training hours after the course has ended.

Description : Use appropriate pre-fix, then actual course/talk title (examples of prefixes: PH HQ or PH CE or PH XXX)
Completion Date : change to the actual course/talk end date
Completion Time : change to the actual course/talk end time
Total Hours : key in the actual total no. of training hours (DO NOT key under "contact hours")
*Total CPE Hours : Key in total no. of CPE hours (stipulated in the guide \u2192 similar to how SPC calculates CPE points)

Below is the user guide link in P drive:
P:\\HRD\\iConnect Slides\\iConnect Capture Training Hours guide_External Event for Add To Learning History feature.pdf

After staff submit, it will route to RO for approval first and then route to LnD.

Thank you.`;
  }

  function showTab(tab) {
    if (tab === 'preview') generateEmail();
    document.getElementById('formView').style.display = tab === 'form' ? 'block' : 'none';
    document.getElementById('previewView').style.display = tab === 'preview' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'form') || (i === 1 && tab === 'preview'));
    });
  }

  function copyEmail() {
    navigator.clipboard.writeText(document.getElementById('emailOutput').textContent).then(() => {
      const msg = document.getElementById('copyMsg');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 2500);
    });
  }

  renderListings();
</script>
</body>
</html>
